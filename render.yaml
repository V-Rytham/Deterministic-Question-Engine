services:
  - type: web
    name: deterministic-mcq-generator
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: MCQ_RETURN_LIMIT
        value: "10"
      - key: MCQ_TARGET
        value: "100"
